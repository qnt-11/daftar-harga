<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DAFTAR HARGA</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        /* === 1. VARIABEL TEMA === */
        :root {
            --wa-bg: #000000; 
            --wa-card: #151515; 
            --wa-header: rgba(17, 17, 17, 0.95);
            --text-light: #ffffff;
            --text-muted: #888888; 
            --border-color: #333333;
            --danger: #ff3b30;   
            --warning: #FFD700;
            --highlight-bg: rgba(255, 255, 255, 0.2);
            --mono-main: #ffffff;
            --mono-sec: #aaaaaa;
        }

        /* === 2. RESET & BASE === */
        html, body { overscroll-behavior-y: none; } 
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; background: var(--wa-bg); color: var(--text-light); font-family: 'Montserrat', sans-serif; font-weight: 500; overflow-x: hidden; }
        body.modal-open { overflow: hidden; } 
        .hidden { display: none !important; }
        .audiowide-regular { font-family: "Audiowide", sans-serif !important; font-weight: 400 !important; }

        /* === 3. HEADER & DROPDOWN === */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--wa-header); backdrop-filter: blur(8px); z-index: 100; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); will-change: transform; }
        .header-left { display: flex; flex-direction: column; justify-content: center; }
        .header h1 { font-size: 18px; margin: 0; color: var(--text-light); }
        .header-date-location { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 600; letter-spacing: 0.5px; }
        
        .top-btns { display: flex; gap: 10px; color: var(--text-light); align-items: center; }
        .icon-btn { cursor: pointer; background: none; border: none; padding: 6px; color: inherit; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; position: relative; width: 44px; height: 44px; outline: none; }
        .icon-btn:active { transform: scale(0.9); opacity: 0.8; }
        
        .header-upload-btn { display: flex; flex-direction: column; gap: 2px; color: #87CEFA; padding: 0; }
        
        .dropdown-wrapper { position: relative; display: flex; align-items: center; }
        .dropdown-content { position: absolute; top: 48px; right: 0; background: rgba(21, 21, 21, 0.95); backdrop-filter: blur(8px); min-width: 180px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 10000; overflow: hidden; border: 1px solid var(--border-color); animation: slideDownGlass 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: top right; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.05); will-change: transform, opacity; }
        @keyframes slideDownGlass { 0% { opacity: 0; transform: scale(0.9) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 15px 16px; color: var(--text-light); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; min-height: 44px; }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:active { background-color: rgba(255,255,255,0.15); }
        .dropdown-item input[type="file"] { display: none; }

        /* === 4. ANIMASI IKON === */
        @keyframes laser-updown-header { 0% { transform: translateY(-4px); } 50% { transform: translateY(4px); } 100% { transform: translateY(-4px); } }
        .laser-beam-header { animation: laser-updown-header 1.5s infinite ease-in-out; filter: drop-shadow(0 0 2px red); }
        .glow-cloud { filter: drop-shadow(0 0 6px rgba(135, 206, 250, 0.8)); }

        /* === 5. SEARCH AREA & SARAN === */
        .search-area { padding: 10px 16px; background: var(--wa-bg); position: sticky; top: 74px; z-index: 90; }
        .search-box { display: flex; align-items: center; background: var(--wa-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 12px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .search-box input { width: 100%; background: transparent; border: none; padding: 14px 44px 14px 5px; color: var(--text-light); font-size: 16px; font-family: 'Montserrat', sans-serif; font-weight: 600; outline: none; }
        .search-icon { width: 20px; height: 20px; color: var(--text-muted); pointer-events: none; margin-right: 8px; }
        .q-clear { position: absolute; right: 2px; top: 2px; bottom: 2px; display: none; width: 44px; cursor: pointer; align-items: center; justify-content: center; }
        .search-summary { font-size: 10px; color: var(--mono-main); margin-top: 6px; margin-left: 5px; font-weight: 600; letter-spacing: 0.5px; }
        .highlight { background-color: var(--highlight-bg); color: #ffffff; border-radius: 3px; padding: 0 2px; }

        .search-dropdown-box { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: rgba(21, 21, 21, 0.98); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; overflow: hidden; animation: slideDownGlass 0.2s ease-out; will-change: transform, opacity; }
        .sd-title { font-size: 10px; color: var(--text-muted); padding: 12px 16px 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        .sd-title span.clear-btn { color: var(--danger); cursor: pointer; font-size: 9px; padding: 5px; margin: -5px; }
        .sd-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; min-height: 44px; color: var(--text-light); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sd-item:active { background-color: rgba(255,255,255,0.15); }
        .sd-icon { color: var(--text-muted); width: 14px; height: 14px; }
        .sd-icon.trend { color: var(--mono-sec); }

        /* === 6. TABS & SORT === */
        .tabs-row { display: flex; align-items: center; padding: 5px 16px 15px 16px; gap: 10px; }
        .tab { padding: 10px 18px; border-radius: 8px; background: var(--wa-card); border: 1px solid var(--border-color); font-size: 11px; color: var(--text-muted); cursor: pointer; font-weight: 700; font-family: 'Montserrat', sans-serif; text-transform: uppercase; transition: 0.2s; outline: none; min-height: 40px; }
        .tab.active { background: rgba(255, 255, 255, 0.15); color: var(--mono-main); border-color: var(--mono-main); }
        .sort-btn { margin-left: auto; color: var(--text-muted); background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; padding: 8px 4px; width: 44px; height: 44px; justify-content: center; outline: none; }
        .sort-btn span { display: block; height: 2px; background: currentColor; border-radius: 2px; }
        .sort-btn span:nth-child(1) { width: 18px; }
        .sort-btn span:nth-child(2) { width: 12px; }
        .sort-btn span:nth-child(3) { width: 6px; }
        .sort-btn.active { color: var(--mono-main); }

        /* === 7. VIRTUAL SCROLL CONTAINER & TRUE FLEXIBLE CARDS === */
        .list { 
            height: calc(100vh - 175px); 
            overflow-y: auto; 
            position: relative; 
            padding-bottom: 15px; 
            scroll-behavior: auto; 
        }
        .spacer { position: absolute; top: 0; left: 0; width: 1px; }
        .render-container { position: absolute; top: 0; left: 0; width: 100%; padding-left: 16px; padding-right: 16px; will-change: transform; transform: translateZ(0); }
        
        .card { 
            position: relative; display: flex; align-items: flex-start; 
            padding: 15px 18px 15px 18px; 
            padding-right: 90px; 
            background: var(--wa-card); border: 1px solid var(--border-color); border-radius: 12px; 
            margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            height: auto; min-height: 90px; 
            overflow: hidden; box-sizing: border-box;
            contain: content; touch-action: pan-y;
        }

        .card-exp-mode {
            height: auto !important;
            min-height: 70px !important;
            padding-bottom: 15px !important;
            align-items: center !important;
            padding-right: 18px !important; 
        }
        
        .info { flex: 1; min-width: 0; pointer-events: none; }
        .name { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: var(--text-light); display: flex; align-items: flex-start; }
        
        .card-badge { font-size: 11px; color: #777777; margin-left: 8px; font-weight: 500; letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); margin-top: -2px; }
        .card-price-ecer { font-size: 13px; color: var(--mono-sec); font-weight: 700; margin-bottom: 3px; }
        .card-price-grosir { font-size: 12px; color: var(--mono-sec); font-weight: 700; margin-bottom: 6px; }
        .card-barcode { font-size: 11px; color: var(--text-muted); font-family: monospace; letter-spacing: 0.5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-exp { font-size: 11px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 4px;}
        .card-exp.warning { color: var(--warning); }
        .card-exp.danger { color: var(--danger); }
        
        .btn-del-absolute { position: absolute; top: 4px; right: 4px; width: 44px; height: 44px; background: none; border: none; color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; outline: none; }
        .btn-del-absolute:active { opacity: 0.5; }
        .action-btns-absolute { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 2px; }
        .card-action-btn { width: 44px; height: 44px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; border-radius: 8px; outline: none; transition: background-color 0.15s ease, opacity 0.15s ease; }
        .card-action-btn:active { background: rgba(255,255,255,0.1); opacity: 1; }
        .btn-edit-icon { color: var(--mono-main); }
        
        .empty-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 100%; color: #555555; font-size: 12px; font-weight: 600; text-align: center; letter-spacing: 0.5px; z-index: 5; }

        .scroll-letter {
            position: fixed; right: 20px; top: 50%;
            color: rgba(255, 255, 255, 0.7); font-size: 30px; font-weight: 800;
            z-index: 100; opacity: 0; pointer-events: none;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 1), 0px 0px 5px rgba(0, 0, 0, 0.8);
            transform: translateY(-50%) scale(0.7);
            transition: opacity 0.2s ease, transform 0.2s ease-out;
        }
        .scroll-letter.show { opacity: 1; transform: translateY(-50%) scale(1); }

        /* === 8. MODAL KONTROL === */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #181818; padding: 25px 20px; border-radius: 16px; width: 100%; max-width: 320px; border: 1px solid var(--border-color); border-top: 3px solid var(--mono-main); box-shadow: 0 20px 50px rgba(0,0,0,0.9); text-align: left; animation: popInBouncy 0.3s ease-out; max-height: 85vh; overflow-y: auto; will-change: transform; overscroll-behavior: contain; }
        @keyframes popInBouncy { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .modal-box label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; margin-top: 14px; font-weight: 600; }
        .modal-box input { width: 100%; padding: 14px 12px; background: var(--wa-bg); border: 1px solid var(--border-color); color: var(--text-light); font-size: 16px; font-family: 'Montserrat', sans-serif; font-weight: 600; outline: none; border-radius: 8px; transition: border-color 0.3s; }
        .modal-box input:focus { border-color: var(--text-light); }
        
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
        .btn-main { width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: 'Montserrat', sans-serif; text-transform: uppercase; background-color: #222222 !important; transition: transform 0.15s ease, opacity 0.2s; border: 1px solid transparent; color: white; display: flex; justify-content: center; align-items: center; min-height: 44px; outline:none; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        .btn-mono { border-color: var(--mono-main) !important; color: var(--mono-main) !important; }
        .btn-cancel { border-color: var(--text-muted) !important; color: var(--text-muted) !important; }

        /* === BIG PRICE POPUP === */
        #price-popup-box { border-top: 5px solid #3CB371 !important; text-align: center; }
        .pp-price-anim { animation: pulseGreen 1s infinite alternate; }
        @keyframes pulseGreen { 0% { text-shadow: 0 0 10px rgba(60, 179, 113, 0.2); } 100% { text-shadow: 0 0 20px rgba(60, 179, 113, 0.8); transform: scale(1.05); } }

        /* === 9. FAB BUTTON === */
        .fab { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom, 0px)); right: 20px; background: #000000; width: 60px; height: 60px; border-radius: 18px; display: flex; justify-content: center; align-items: center; border: 2px solid var(--border-color); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8); z-index: 500; cursor: pointer; transition: transform 0.2s, border-color 0.2s; outline: none; }
        .fab:active { transform: scale(0.9); border-color: var(--mono-sec); }

        /* === 10. SCANNER === */
        #scanner-wrap { display: none; background: #000; position: fixed; inset: 0; z-index: 3500; }
        #reader { width: 100%; height: 100%; }
        .scanner-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 3510; box-shadow: inset 0 0 0 4000px rgba(0,0,0,0.6); }
        .scanner-box { width: 250px; height: 200px; border: 2px solid #ffffff; position: relative; border-radius: 16px; overflow: hidden; box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .scanner-laser { width: 100%; height: 2px; background: red; position: absolute; box-shadow: 0 0 10px 2px red; animation: scan-anim 2s infinite ease-in-out; }
        @keyframes scan-anim { 0% { top: 5%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 95%; opacity: 0; } }
        .scan-stop { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: #000000; color: var(--danger); border: 1px solid var(--danger); padding: 15px 40px; border-radius: 12px; font-weight: 700; font-family: 'Montserrat', sans-serif; z-index: 3520; cursor: pointer; min-height: 48px; }

        /* === 11. TOAST === */
        #toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px); background: rgba(21, 21, 21, 0.95); border: 1px solid var(--border-color); border-bottom: 2px solid var(--mono-main); color: var(--text-light); padding: 14px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; z-index: 99999; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; white-space: nowrap; will-change: transform, opacity; }
        #toast-notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* === 12. KALENDER === */
        .picker-box-new { background: #111111; padding: 24px 20px; border-radius: 18px; width: 90%; max-width: 330px; border: 1px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.9); text-align: center; margin: auto; animation: popInBouncy 0.3s ease-out; }
        .picker-header-new { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 10px; }
        .picker-nav-new { background: none; border: none; color: white; font-size: 20px; font-weight: 800; cursor: pointer; padding: 10px; outline: none; transition: 0.2s; min-width: 44px; }
        .picker-nav-new:active { opacity: 0.5; }
        .picker-year-new { font-size: 16px; font-weight: 700; color: var(--mono-main); font-family: 'Montserrat', sans-serif; }
        .picker-grid-new { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; margin-bottom: 30px; }
        .month-item { color: white; font-size: 14px; font-weight: 600; padding: 12px 0; border-radius: 12px; cursor: pointer; transition: background 0.2s, transform 0.1s; user-select: none; }
        .month-item:active { transform: scale(0.9); }
        .month-item.active { background: var(--mono-main); color: #000; font-weight: 700; }
        .picker-footer-new { display: flex; gap: 10px; justify-content: space-between; }
        .btn-picker-new { flex: 1; background: transparent; border: 1.5px solid var(--mono-main); border-radius: 12px; padding: 14px 0; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-family: 'Montserrat', sans-serif; outline: none; min-height: 44px; }
        .btn-picker-new.color-main { color: var(--mono-main); }
        .btn-picker-new.color-danger { border-color: var(--danger); color: var(--danger); }
        .btn-picker-new:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1 class="audiowide-regular"><span style="color:var(--text-light);">DAFTAR</span> <span style="color:var(--text-muted);">HARGA</span></h1>
            <span id="current-date-location" class="header-date-location">Boyolali, Memuat...</span>
        </div>
        <div class="top-btns">
            <button class="icon-btn" onclick="openScanner('search')" title="Scan Pencarian Cepat">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="5" ry="5" stroke="white" stroke-width="1.5"></rect>
                    <line class="laser-beam-header" x1="5" y1="12" x2="19" y2="12" stroke="red" stroke-width="2" stroke-linecap="round"></line>
                </svg>
            </button>
            <button class="icon-btn header-upload-btn" onclick="backupToCloud()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#87CEFA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="glow-cloud">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                    <path d="M12 16V8"></path>
                    <path d="M9 11l3-3 3 3"></path>
                </svg>
                <span style="font-size: 8px; font-weight: 700; letter-spacing: 0.5px; color:#87CEFA;">UPLOAD</span>
            </button>
            <div class="dropdown-wrapper">
                <button class="icon-btn" id="kebab-btn" onclick="toggleMenu(event)">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
                        <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </button>
                <div id="dropdown-menu" class="dropdown-content hidden">
                    <div class="dropdown-item" onclick="loadFromCloud()" style="color: #87CEFA;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#87CEFA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path><path d="M12 8v8"></path><path d="M9 13l3 3 3-3"></path>
                        </svg> Load Cloud
                    </div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); margin: 4px 0;"></div>
                    <div class="dropdown-item" onclick="exportData()" style="color: #3CB371;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3CB371" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><rect x="8" y="13" width="8" height="6" rx="0.5"></rect><line x1="12" y1="13" x2="12" y2="19"></line><line x1="8" y1="16" x2="16" y2="16"></line>
                        </svg> Save Excel
                    </div>
                    <label class="dropdown-item" style="color: #3CB371;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3CB371" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M12 18v-6"></path><path d="M9 15l3-3 3 3"></path>
                        </svg> Load Excel
                        <input type="file" accept=".xlsx, .xls" onchange="importData(event)">
                    </label>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); margin: 4px 0;"></div>
                    
                    <div class="dropdown-item" onclick="optimizeData()" style="color: #FFA500;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFA500" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2.5 21.5l5.5-5.5"></path>
                            <path d="M7 10l6-6c1.5-1.5 4.5-1.5 6 0s1.5 4.5 0 6l-6 6"></path>
                            <path d="M12 8l4 4"></path>
                            <path d="M8 12l4 4"></path>
                        </svg> Bersihkan Cache
                    </div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); margin: 4px 0;"></div>

                    <div class="dropdown-item" onclick="deleteAllDataPrompt()" style="color: var(--danger);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg> Hapus Semua Data
                    </div>

    <div id="toast-notification" class="hidden"><span id="toast-message"></span></div>

    <script>
        // === 1. UTILITAS DOM & GLOBAL ===
        const $ = (id) => document.getElementById(id);
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbykkqKgvQ9u5uGpUJ3_dv4Qy0WSy64V0ACi2AnhI00GvyVdXoZ34nrk9AKpRDQCsg-_1A/exec";
        const NamaBln = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const NamaBlnPendek = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];

        let db = [], idb;
        let worker, workerResult = null; 
        let filteredData = []; 
        let listOffsets = []; 
        let lastStartIndex = -1; 
        let lastEndIndex = -1;
        let currentSearchReqId = 0; 
        let inputBuffer = '';
        let bufferTimer;
        
        let barcodeMap = new Map();
        let acronymMap = new Map();
        let physicalInputBuffer = "";
        let lastKeyTime = 0;

        let tab = 'all', activeId = null, html5QrCode = null, isScanning = false, isStartingScan = false, sortAZ = false, scanMode = 'search'; 
        let toastTimeoutHide, toastTimeoutRemove;
        const Picker = { sel: new Date(), targetId: '', tempYear: new Date().getFullYear(), tempMonth: new Date().getMonth() };
        
        let recentSearches = JSON.parse(localStorage.getItem('DB_WA_RECENT')) || [];
        let trendingSearches = JSON.parse(localStorage.getItem('DB_WA_TRENDING')) || {};
        
        let isSaving = false;
        let isScrollLetterActive = false;
        let scrollLetterTimeout;

        const TemaNotifikasi = {
            "Error": "var(--danger)", "Gagal": "var(--danger)", "Hapus": "var(--danger)",
            "Peringatan": "var(--warning)", "Optimasi Sistem": "#FFA500", "Sistem Bersih": "#FFA500",
            "Backup": "#87CEFA", "Sinkronisasi": "#87CEFA", "Sukses": "#3CB371", "Info": "var(--mono-main)"
        };

        // === FITUR WAKE LOCK ===
        let wakeLock = null;
        let isWakeLockRequested = false;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator && wakeLock === null) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Layar dikunci agar selalu menyala.');
                }
            } catch (err) {
                console.warn('Wake Lock error:', err);
            }
        }

        document.addEventListener('click', () => {
            if (!isWakeLockRequested) {
                isWakeLockRequested = true;
                requestWakeLock();
            }
        }, { once: true });

        document.addEventListener('visibilitychange', async () => {
            if (isWakeLockRequested && document.visibilityState === 'visible') {
                wakeLock = null; 
                await requestWakeLock();
            }
        });

        function tampilkanToast(msg, color="var(--mono-main)") {
            const t = $('toast-notification'); $('toast-message').innerText = msg; t.style.borderBottomColor = color;
            clearTimeout(toastTimeoutHide); clearTimeout(toastTimeoutRemove);
            t.classList.remove('hidden'); setTimeout(() => t.classList.add('show'), 10);
            toastTimeoutHide = setTimeout(() => { t.classList.remove('show'); toastTimeoutRemove = setTimeout(() => t.classList.add('hidden'), 400); }, 3000);
        }

        // === 2. INDEXEDDB ===
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('HargaDB_Pro', 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('items')) {
                        database.createObjectStore('items', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(idb = e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }
        
        function loadAllFromIDB() {
            return new Promise((resolve, reject) => {
                const req = idb.transaction('items', 'readonly').objectStore('items').getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject("Gagal memuat data");
            });
        }

        function saveItemToIDB(item) {
            return new Promise((resolve, reject) => {
                const tx = idb.transaction('items', 'readwrite');
                tx.objectStore('items').put(item);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject("Gagal menyimpan data");
            });
        }

        // === 3. UTILITAS FORMAT & SECURITY ===
        function updateMaps() {
            barcodeMap.clear();
            acronymMap.clear();
            db.forEach(item => {
                if (!item.deleted) {
                    if (item.b) barcodeMap.set(String(item.b).trim(), item);
                    if (item.t) acronymMap.set(String(item.t).trim().toLowerCase(), item);
                }
            });
        }

        function generateUniqueId() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
        }

        const fetchWithTimeout = (url, options, timeout = 30000) => {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT_ERROR')), timeout))
            ]);
        };

        function isAcronymUsed(acr, excludeId, tempSet = null) {
            if (tempSet && tempSet.has(acr)) return true;
            const existing = acronymMap.get(acr);
            if (!existing) return false;
            if (excludeId && String(existing.id) === String(excludeId)) return false; 
            return true;
        }

        function generateSmartAcronym(name, excludeId = null, tempSet = null) {
            if (!name) return "xxx";
            let cleanName = String(name).toLowerCase();
            let numMatch = cleanName.match(/\d+/g);
            let numbers = numMatch ? numMatch.join('') : ''; 
            let textOnly = cleanName.replace(/[0-9]/g, '');
            let stopWords = /^(dan|yg|pcs|isi|dengan|rasa|untuk)$/;
            let words = textOnly.replace(/[^a-z\s]/g, ' ').split(/\s+/).filter(w => w.length > 0 && !stopWords.test(w));
            if (words.length === 0) return "xxx" + numbers;
            let tryAcr = "";
            if (words.length === 1) {
                let w = words[0];
                let cons = w.replace(/[aeiou]/g, '');
                if (cons.length >= 2) { tryAcr = cons.substring(0, 3) + numbers; } 
                else { tryAcr = w.substring(0, 3) + numbers; }
                if (!isAcronymUsed(tryAcr, excludeId, tempSet)) return tryAcr;
                let c = 2;
                while (isAcronymUsed(tryAcr + c, excludeId, tempSet)) c++;
                return tryAcr + c;
            }
            let baseLetters = words.slice(0, 5).map(w => w[0]).join('');
            tryAcr = baseLetters + numbers;
            if (!isAcronymUsed(tryAcr, excludeId, tempSet)) return tryAcr;
            if (words[0].length >= 2) {
                let alt1 = words[0].substring(0, 2) + words.slice(1, 4).map(w => w[0]).join('') + numbers;
                if (!isAcronymUsed(alt1, excludeId, tempSet)) return alt1;
            }
            if (words.length >= 2 && words[0].length >= 2 && words[1].length >= 2) {
                let alt2 = words[0].substring(0, 2) + words[1].substring(0, 2) + words.slice(2, 4).map(w => w[0]).join('') + numbers;
                if (!isAcronymUsed(alt2, excludeId, tempSet)) return alt2;
            }
            let c = 2;
            while (isAcronymUsed(tryAcr + c, excludeId, tempSet)) c++;
            return tryAcr + c;
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); 
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1); 
            } catch(e) {}
        }

        function normalizeDateYMD(dStr) {
            if (!dStr) return ''; 
            const pts = dStr.split(/[\-\/]/);
            if (pts.length === 3) {
                let y = pts[0].length === 4 ? pts[0] : pts[2];
                let m = pts[1];
                let d = pts[0].length === 4 ? pts[2] : pts[0];
                return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            }
            return '';
        }

        function formatBulanTahun(dStr) {
            if (!dStr) return ''; 
            const parts = String(dStr).split('-');
            if (parts.length >= 2) return `${NamaBln[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
            return dStr;
        }

        function parseBulanTahunExcel(str) {
            if (str === undefined || str === null || str === '') return ""; 
            if (!isNaN(str) && Number(str) > 20000) {
                let excelDays = Math.floor(Number(str) - 25569);
                let dateInfo = new Date(Date.UTC(1970, 0, 1 + excelDays));
                return `${dateInfo.getUTCFullYear()}-${String(dateInfo.getUTCMonth() + 1).padStart(2, '0')}-01`;
            }
            const parts = String(str).trim().split(/[\s-]+/);
            if (parts.length === 2) { 
                let b = NamaBln.findIndex(x => x.toLowerCase() === parts[0].toLowerCase()); 
                if (b === -1) b = NamaBlnPendek.findIndex(x => x.toLowerCase() === parts[0].toLowerCase());
                if (b !== -1) return `${parts[1]}-${String(b + 1).padStart(2, '0')}-01`; 
            }
            return normalizeDateYMD(String(str));
        }

        function parseExcelPrice(val) {
            if (val === null || val === undefined || val === '') return null;
            let num = Number(val);
            if (!isNaN(num)) return Math.floor(num); 
            let str = String(val).trim().replace(/Rp\s?/gi, '');
            if (/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(str)) { str = str.replace(/,/g, '').split('.')[0]; } 
            else if (/^\d{1,3}(\.\d{3})*(,\d+)?$/.test(str)) { str = str.replace(/\./g, '').split(',')[0]; } 
            else { str = str.split(',')[0].split('.')[0].replace(/\D/g, ''); }
            return parseInt(str, 10) || 0;
        }

        function fmt(n) { return n ? new Intl.NumberFormat('id-ID').format(n) : "0"; }
        function escapeHTML(str) { return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
        
        function prop(s) { 
            if (!s) return "";
            let clean = String(s).replace(/<\/?[^>]+(>|$)/g, ""); 
            return clean.trim().split(/([\s/-])/).map(w => w && !/[\s/-]/.test(w) ? w.charAt(0).toUpperCase() + w.slice(1) : w).join('').replace(/\s+/g, ' '); 
        }

        function highlightMatch(text, searchTerm) {
            const safeText = escapeHTML(text || "");
            if (!searchTerm || searchTerm.trim() === '') return safeText;
            const safeTerm = escapeHTML(searchTerm.trim());
            const regex = new RegExp(`(${safeTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return safeText.replace(regex, '<span class="highlight">$1</span>');
        }
        
        function formatRp(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val ? fmt(parseInt(val, 10) || 0) : "";
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // === 4. TANGKAPAN GLOBAL & AUTO DETECT SCANNER ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideMod(); hidePicker(); closeCustomAlert(); closePinModal(); closePricePopup(e, true);
                if (isScanning) closeScanner();
                document.body.classList.remove('modal-open');
                return;
            }
            if (document.body.classList.contains('modal-open') || isScanning) return;
            const activeTag = document.activeElement.tagName.toLowerCase();
            if (activeTag === 'input' || activeTag === 'textarea') return;
            const currentTime = Date.now();
            
            if (currentTime - lastKeyTime > 150) { physicalInputBuffer = ""; }
            lastKeyTime = currentTime;
            
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                physicalInputBuffer += e.key;
                inputBuffer += e.key;
                clearTimeout(bufferTimer);
                bufferTimer = setTimeout(() => {
                    if (inputBuffer.length > 0) { 
                        const searchBox = $('q');
                        searchBox.value = inputBuffer;
                        $('q-x').style.display = 'flex';
                        $('list').scrollTop = 0; 
                        handleSearchLogic(inputBuffer); 
                    }
                    inputBuffer = ''; 
                }, 150); 
            } else if (e.key === 'Enter') {
                if (physicalInputBuffer.length >= 5) {
                    const scannedBarcode = physicalInputBuffer;
                    physicalInputBuffer = ""; inputBuffer = "";
                    clearTimeout(bufferTimer); e.preventDefault(); 
                    handlePhysicalScanner(scannedBarcode);
                    return;
                }
                if (inputBuffer.length > 0) {
                    physicalInputBuffer = ""; clearTimeout(bufferTimer);
                    const searchBox = $('q'); searchBox.value = inputBuffer;
                    $('q-x').style.display = 'flex'; $('list').scrollTop = 0; 
                    handleSearchLogic(inputBuffer); inputBuffer = ''; searchBox.blur(); 
                }
            }
        });

        function handlePhysicalScanner(barcode) {
            const item = barcodeMap.get(barcode);
            if (item) {
                playBeep();
                $('pp-name').innerText = item.n;
                $('pp-price').innerText = "Rp " + fmt(item.p1);
                $('pp-price-grosir').innerText = item.p2 ? "Grosir: Rp " + fmt(item.p2) : "";
                $('pp-barcode').innerText = item.b || "";
                $('price-popup').style.display = 'flex';
                document.body.classList.add('modal-open');
            } else { tampilkanToast("Barcode tidak ditemukan!", "var(--danger)"); }
        }

        function closePricePopup(e, force = false) {
            if (force || e.target === $('price-popup')) {
                $('price-popup').style.display = 'none';
                document.body.classList.remove('modal-open');
                $('q').value = ''; clearSearch();
            }
        }

        function handleSearchLogic(query) {
            const qVal = query.trim();
            const qValLower = qVal.toLowerCase();
            const exactItem = barcodeMap.get(qVal) || acronymMap.get(qValLower);
            if (exactItem && qVal.length > 0) {
                currentSearchReqId++; 
                workerResult = [exactItem]; applyFiltersAndRender();
            } else {
                worker.postMessage({ type: 'search', query: qVal, reqId: ++currentSearchReqId });
            }
        }

        // === 5. LOGIKA PENCARIAN (WEB WORKER) ===
        const searchInput = $('q'), searchDropdown = $('search-dropdown'), sdContent = $('sd-content');
        const workerScript = `
            importScripts('https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js');
            let fuse;
            let workerList = [];
            
            function rebuildIndex() {
                fuse = new Fuse(workerList, { keys: [{name: 'n', weight: 0.6}, {name: 't', weight: 0.4}, {name: 'b', weight: 0.8}], threshold: 0.2, ignoreLocation: true });
            }
            
            self.onmessage = function(e) {
                if (e.data.type === 'init') {
                    workerList = e.data.db;
                    rebuildIndex();
                } else if (e.data.type === 'add') {
                    if(!fuse) return;
                    workerList.push(e.data.item);
                    fuse.add(e.data.item);
                } else if (e.data.type === 'update') {
                    if(!fuse) return;

                if (listOffsets[mid] === scrollTop) return mid;
                if (listOffsets[mid] < scrollTop) low = mid + 1;
                else high = mid - 1;

            return high > 0 ? high : 0;

        function applyFiltersAndRender(silentBarcode = null) {
            const qVal = $('q').value.trim(); const qValLower = qVal.toLowerCase();

            const todayReset = new Date(); todayReset.setHours(0,0,0,0);
            const utcToday = Date.UTC(todayReset.getFullYear(), todayReset.getMonth(), todayReset.getDate());
            
            filteredData = baseData.filter(i => {

        // === 9. DATABASE OPERATION ===
        async function save() {
            if (isSaving) return; isSaving = true;
            try {
                const nRaw = $('i-n').value; const b = $('i-b').value.trim(); const exp = $('i-exp').dataset.rawDate || '';
                const p1 = parseInt($('i-p1').value.replace(/[^\d]/g, ''), 10) || 0;
                const p2 = parseInt($('i-p2').value.replace(/[^\d]/g, ''), 10) || null;
                if (!nRaw.trim() || p1 === 0) { isSaving = false; return showAlert("Data tidak valid!", "Gagal"); }
                const nameClean = prop(nRaw);

                const existItem = db.find(x => !x.deleted && String(x.n || "").toLowerCase() === nameClean.toLowerCase() && String(x.id) !== String(activeId));
                if (existItem) { isSaving = false; return showAlert("Nama sudah ada!", "Gagal"); }
                
                if (b !== '') {
                    const existBarcode = db.find(x => !x.deleted && String(x.b) === b && String(x.id) !== String(activeId));
                    if (existBarcode) { isSaving = false; return showAlert("Barcode ini sudah dipakai oleh barang lain!", "Gagal"); }
                }
                
                let customT = $('i-t').value.trim().toLowerCase();
                if (customT && isAcronymUsed(customT, activeId)) { isSaving = false; return showAlert("Singkatan sudah dipakai!", "Gagal"); }
                if (!customT) customT = generateSmartAcronym(nameClean, activeId);
                
                const ts = Date.now();
                if (activeId) {
                    const idx = db.findIndex(x => String(x.id) === String(activeId));
                    db[idx] = { ...db[idx], b, n: nameClean, p1, p2, exp, t: customT, updatedAt: ts };
                    await saveItemToIDB(db[idx]);
                    worker.postMessage({ type: 'update', item: db[idx] }); 
                    
                    if (workerResult !== null) {
                        const wIdx = workerResult.findIndex(x => String(x.id) === String(activeId));
                        if (wIdx > -1) workerResult[wIdx] = db[idx]; 
                    }
                } else {
                    const newItem = { id: generateUniqueId(), b, n: nameClean, p1, p2, f: false, exp, t: customT, updatedAt: ts, deleted: false };
                    db.push(newItem); await saveItemToIDB(newItem);
                    worker.postMessage({ type: 'add', item: newItem }); 
                    
                    if (workerResult !== null) {
                        workerResult.unshift(newItem); 
                    }
                }
                
                updateMaps(); 
                hideMod(); 
                applyFiltersAndRender(); 
                tampilkanToast("Data disimpan!");
            } catch (e) { console.error(e); } finally { isSaving = false; }
        }

        async function del(id) {
            const idx = db.findIndex(x => String(x.id) === String(id)); if(idx === -1) return;
            showConfirm(`Hapus "${db[idx].n}"?`, "Hapus", async () => {
                db[idx].deleted = true; db[idx].updatedAt = Date.now();
                await saveItemToIDB(db[idx]); 
                worker.postMessage({ type: 'remove', id: String(id) });
                
                if (workerResult !== null) {
                    workerResult = workerResult.filter(x => String(x.id) !== String(id));
                }
                
                updateMaps();
                applyFiltersAndRender();
                tampilkanToast("Dihapus!", "var(--danger)");
            });
        }

        async function executeDeleteAll() {
            tampilkanToast("Memproses penghapusan massal...", "var(--danger)");
            $('list').style.pointerEvents = 'none'; 
            try {
                const tx = idb.transaction('items', 'readwrite'); const store = tx.objectStore('items'); const ts = Date.now();
                db.forEach(item => { if (!item.deleted) { item.deleted = true; item.updatedAt = ts; store.put(item); } });
                tx.oncomplete = () => { 
                    worker.postMessage({ type: 'init', db: [] });
                    updateMaps();
                    applyFiltersAndRender();
                    $('list').style.pointerEvents = 'auto'; 
                    tampilkanToast("Semua data berhasil dihapus!", "var(--danger)"); 
                };
            } catch(e) { $('list').style.pointerEvents = 'auto'; showAlert("Gagal menghapus data massal.", "Error"); }
        }

        async function toggleFav(id, btnElement) {
            const idx = db.findIndex(x => String(x.id) === String(id));
            if(idx !== -1) { 
                db[idx].f = !db[idx].f; db[idx].updatedAt = Date.now(); await saveItemToIDB(db[idx]); 
                if (btnElement) {
                    btnElement.style.color = db[idx].f ? 'var(--mono-main)' : 'var(--text-muted)';
                    btnElement.innerHTML = `<svg pointer-events="none" viewBox="0 0 24 24" width="20" height="20" fill="${db[idx].f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
                }
                if (tab === 'fav') applyFiltersAndRender();
            }
        }

        // === FITUR OPTIMASI & BERSIHKAN CACHE ===
        function optimizeData() {
            $('dropdown-menu').classList.add('hidden'); 
            showConfirm("Membersihkan memori dari data sampah dan riwayat pencarian?", "Optimasi Sistem", () => {
                tampilkanToast("Mengoptimalkan sistem...", "#FFA500");
                
                recentSearches = [];
                trendingSearches = {};
                localStorage.removeItem('DB_WA_RECENT');
                localStorage.removeItem('DB_WA_TRENDING');
                
                const tx = idb.transaction('items', 'readwrite'); 
                const store = tx.objectStore('items');
                let ghostCount = 0;
                const activeDb = []; 
                
                db.forEach(item => {
                    if (item.deleted) {
                        store.delete(item.id); 
                        ghostCount++;
                    } else {
                        activeDb.push(item); 
                    }
                });
                
                tx.oncomplete = () => {
                    db = activeDb; 
                    worker.postMessage({ type: 'init', db: db }); 
                    updateMaps(); 
                    clearSearch(); 
                    setTimeout(() => {
                        showAlert(`BERHASIL!!!\n\nMembersihkan: ${ghostCount} Data Sampah`, "Pembersihan Cache");
                    }, 500);
                };
                tx.onerror = () => { showAlert("Gagal melakukan optimasi database.", "Error"); };
            });
        }

        // === 10. CLOUD SYNC & EXPORT/IMPORT ===
        function backupToCloud() {
            if (db.length === 0) return;
            showConfirm("Upload ke Cloud?", "Backup", () => {
                tampilkanToast("Menyimpan...");
                fetchWithTimeout(CLOUD_URL, { method: 'POST', body: JSON.stringify({ action: 'backup', data: db }) }, 30000)
                .then(() => tampilkanToast("Berhasil!", "#87CEFA"))
                .catch(() => showAlert("Gagal upload.", "Error"));
            });
        }
        
        function loadFromCloud() {
            showConfirm("Load Cloud", "Sinkronisasi", () => {
                tampilkanToast("Memuat...");
                fetchWithTimeout(CLOUD_URL + "?action=load&t=" + Date.now(), {}, 30000)
                .then(res => res.json()).then(async dataCloud => {
                    if (Array.isArray(dataCloud)) {
                        const tx = idb.transaction('items', 'readwrite'); const store = tx.objectStore('items');
                        dataCloud.forEach(itemCloud => { 
                            const localIdx = db.findIndex(l => l.id === itemCloud.id);
                            if (localIdx > -1) {
                                if ((itemCloud.updatedAt || 0) > (db[localIdx].updatedAt || 0)) {
                                    db[localIdx] = itemCloud;
                                    if (itemCloud.deleted) { store.delete(itemCloud.id); } else { store.put(itemCloud); }
                                }
                            } else {
                                db.push(itemCloud);
                                if (!itemCloud.deleted) { store.put(itemCloud); }
                            }
                        });
                        tx.oncomplete = () => { 
                            worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) });
                            updateMaps(); 
                            clearSearch();
                            tampilkanToast("Sinkronisasi Selesai!", "#87CEFA"); 
                        };
                    }
                }).catch(() => showAlert("Gagal load.", "Error"));
            });
        }
        
        function exportData() {
            const data = db.filter(i => !i.deleted).map(i => ({ 
                "ID": i.id,
                "Barcode": i.b, 
                "Nama Barang": i.n, 
                "Harga Eceran": i.p1, 
                "Harga Grosir": i.p2, 
                "Singkatan": i.t,
                "Favorit": i.f ? "Ya" : "Tidak",
                "Expired": i.exp || ""
            }));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "Data"); XLSX.writeFile(wb, "Data_Harga.xlsx");
        }
        
        function importData(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const workbook = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { raw: false, defval: "" });
                const tx = idb.transaction('items', 'readwrite'); const store = tx.objectStore('items');
                let tempAcronyms = new Set();
                const ts = Date.now();
                
                jsonData.forEach(row => {
                    const name = prop(row["Nama Barang"] || row["Nama"]); if(!name) return;
                    let customT = row["Singkatan"]; if (!customT) { customT = generateSmartAcronym(name, null, tempAcronyms); }
                    if (customT) tempAcronyms.add(customT); 
                    
                    const excelId = row["ID"] ? String(row["ID"]).trim() : null;
                    const safeBarcode = row["Barcode"] ? String(row["Barcode"]).trim() : '';
                    
                    const isFav = row["Favorit"] === "Ya" || row["Favorit"] === "TRUE";
                    const expDate = parseBulanTahunExcel(row["Expired"]);
                    
                    let existingIdx = db.findIndex(x => (excelId && String(x.id) === String(excelId)) || (x.n.toLowerCase() === name.toLowerCase()));

                    if (existingIdx > -1) {
                        db[existingIdx] = {
                            ...db[existingIdx],
                            b: safeBarcode,
                            p1: parseExcelPrice(row["Harga Eceran"]),
                            p2: parseExcelPrice(row["Harga Grosir"]),
                            t: customT,
                            f: isFav,
                            exp: expDate,
                            updatedAt: ts,
                            deleted: false
                        };
                        store.put(db[existingIdx]);
                    } else {
                        const newItem = { 
                            id: excelId || generateUniqueId(), 
                            b: safeBarcode, 
                            n: name, 
                            p1: parseExcelPrice(row["Harga Eceran"]), 
                            p2: parseExcelPrice(row["Harga Grosir"]), 
                            t: customT, 
                            f: isFav,
                            exp: expDate,
                            updatedAt: ts, 
                            deleted: false 
                        };
                        db.push(newItem); 
                        store.put(newItem);
                    }
                });
                tx.oncomplete = () => { 
                    worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) });
                    updateMaps(); 
                    clearSearch();
                    tampilkanToast("Import Selesai!"); 
                };
            };
            reader.readAsArrayBuffer(file);
        }
        
        async function openScanner(mode) {
            if(isStartingScan || isScanning) return; 
            isStartingScan = true; scanMode = mode;
            $('scanner-wrap').style.display = 'block'; 
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            
            try {
                const cameraConfig = { 
                    fps: 15, 
                    qrbox: { width: 250, height: 150 }, 
                    disableFlip: false 
                };

                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    cameraConfig, 
                    async (text) => {
                        playBeep(); await closeScanner();
                        if (scanMode === 'search') {
                            const exist = db.find(i => !i.deleted && String(i.b) === text.trim());
                            if (exist) { 
                                $('q').value = text.trim(); $('q-x').style.display = 'flex'; handleSearchLogic(text.trim()); 
                            } else { showMod(); $('i-b').value = text.trim(); }
                        } else { $('i-b').value = text.trim(); }
                    }
                );
                isScanning = true;
            } catch (e) { 
                await closeScanner(); 
                showAlert("Kamera Error atau Izin Kamera Ditolak.", "Error Kamera"); 
                console.error("Scanner Error:", e);
            } finally { 
                isStartingScan = false; 
            }
        }

        async function closeScanner() {
            $('scanner-wrap').style.display = 'none'; 
            if (isScanning && html5QrCode) { try { await html5QrCode.stop(); html5QrCode.clear(); } catch(e) {} }
            isScanning = false;
        }

        async function initApp() {
            try {
                const t = new Date(); $('current-date-location').innerText = `Boyolali, ${t.getDate()} ${NamaBln[t.getMonth()]} ${t.getFullYear()}`;
                await initDB(); db = await loadAllFromIDB(); 
                worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) });
                updateMaps(); 
                applyFiltersAndRender();
            } catch (e) { showAlert("DB Error", "Error"); }
        }
        initApp();
    </script>

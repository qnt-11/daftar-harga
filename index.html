<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DAFTAR HARGA</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        /* === 1. VARIABEL TEMA === */
        :root {
            --wa-bg: #000000; 
            --wa-card: #151515; 
            --wa-header: rgba(17, 17, 17, 0.95);
            --text-light: #ffffff;
            --text-muted: #a0a0a0; 
            --border-color: #333333;
            --danger: #ff3b30;   
            --warning: #FFD700;
            --highlight-bg: rgba(255, 255, 255, 0.2);
            --mono-main: #ffffff;
            --mono-sec: #aaaaaa;
        }

        /* === 2. RESET & BASE === */
        html, body { overscroll-behavior-y: none; } 
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; background: var(--wa-bg); color: var(--text-light); font-family: 'Montserrat', sans-serif; font-weight: 500; overflow-x: hidden; }
        body.modal-open { overflow: hidden; } 
        .hidden { display: none !important; }
        .audiowide-regular { font-family: "Audiowide", sans-serif !important; font-weight: 400 !important; }

        /* === 3. HEADER (Z-INDEX 100, SCROLL ALAMI) === */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; background: var(--wa-header); z-index: 100; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); }
        .header-left { display: flex; flex-direction: column; justify-content: center; }
        .header h1 { font-size: 18px; margin: 0; color: var(--text-light); }
        .header-date-location { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 600; letter-spacing: 0.5px; }
        
        .top-btns { display: flex; gap: 10px; color: var(--text-light); align-items: center; }
        .icon-btn { cursor: pointer; background: none; border: none; padding: 6px; color: inherit; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; position: relative; width: 44px; height: 44px; outline: none; }
        .icon-btn:active { transform: scale(0.9); opacity: 0.8; }
        .header-upload-btn { display: flex; flex-direction: column; gap: 2px; color: #87CEFA; padding: 0; }
        
        /* DROPDOWN MENU */
        .dropdown-wrapper { position: relative; display: flex; align-items: center; }
        .dropdown-content { position: absolute; top: 48px; right: 0; background: rgba(21, 21, 21, 0.95); backdrop-filter: blur(8px); min-width: 180px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 10000; overflow: hidden; border: 1px solid var(--border-color); border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.05); }
        .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 15px 16px; color: var(--text-light); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); min-height: 44px; }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:active { background-color: rgba(255,255,255,0.15); }
        .dropdown-item input[type="file"] { display: none; }

        @keyframes laser-updown-header { 0% { transform: translateY(-4px); } 50% { transform: translateY(4px); } 100% { transform: translateY(-4px); } }
        .laser-beam-header { animation: laser-updown-header 1.5s infinite ease-in-out; filter: drop-shadow(0 0 2px red); }
        .glow-cloud { filter: drop-shadow(0 0 6px rgba(135, 206, 250, 0.8)); }

        /* === 4. SEARCH AREA (Z-INDEX 90, STICKY TOP) === */
        .search-area { padding: 10px 16px; background: var(--wa-bg); position: sticky; top: 0; z-index: 90; box-shadow: 0 4px 10px -5px rgba(0,0,0,0.8); }
        .search-box { display: flex; align-items: center; background: var(--wa-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 12px; position: relative; }
        .search-box input { width: 100%; background: transparent; border: none; padding: 14px 44px 14px 5px; color: var(--text-light); font-size: 16px; font-family: 'Montserrat', sans-serif; font-weight: 600; outline: none; }
        .search-icon { width: 20px; height: 20px; color: var(--text-muted); pointer-events: none; margin-right: 8px; }
        .q-clear { position: absolute; right: 2px; top: 2px; bottom: 2px; display: none; width: 44px; cursor: pointer; align-items: center; justify-content: center; }
        .search-summary { font-size: 10px; color: var(--mono-main); margin-top: 6px; margin-left: 5px; font-weight: 600; letter-spacing: 0.5px; }
        .highlight { background-color: var(--highlight-bg); color: #ffffff; border-radius: 3px; padding: 0 2px; }

        .search-dropdown-box { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: rgba(21, 21, 21, 0.98); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; overflow: hidden; }
        .sd-title { font-size: 10px; color: var(--text-muted); padding: 12px 16px 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        .sd-title span.clear-btn { color: var(--danger); cursor: pointer; font-size: 9px; padding: 12px; margin: -12px; display: flex; align-items: center; justify-content: center; }
        .sd-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; min-height: 44px; color: var(--text-light); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sd-item:active { background-color: rgba(255,255,255,0.15); }

        /* === 5. TABS (Z-INDEX 85, STICKY DENGAN BAYANGAN) === */
        .tabs-row { 
            display: flex; align-items: center; padding: 5px 16px 15px 16px; gap: 10px; 
            position: sticky; top: 66px; background: var(--wa-bg); z-index: 85; 
            box-shadow: 0 10px 15px -10px rgba(0,0,0,0.8); 
        }
        .tab { padding: 10px 18px; border-radius: 8px; background: var(--wa-card); border: 1px solid var(--border-color); font-size: 11px; color: var(--text-muted); cursor: pointer; font-weight: 700; font-family: 'Montserrat', sans-serif; text-transform: uppercase; transition: 0.2s; outline: none; min-height: 40px; }
        .tab.active { background: rgba(255, 255, 255, 0.15); color: var(--mono-main); border-color: var(--mono-main); box-shadow: 0 0 8px rgba(255, 255, 255, 0.1); }
        .sort-btn { margin-left: auto; color: var(--text-muted); background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; padding: 8px 4px; width: 44px; height: 44px; justify-content: center; outline: none; }
        .sort-btn span { display: block; height: 2px; background: currentColor; border-radius: 2px; }
        .sort-btn span:nth-child(1) { width: 18px; }
        .sort-btn span:nth-child(2) { width: 12px; }
        .sort-btn span:nth-child(3) { width: 6px; }
        .sort-btn.active { color: var(--mono-main); }

        /* === 6. VIRTUAL SCROLL CONTAINER === */
        .list { height: calc(100vh - 145px); overflow-y: auto; position: relative; padding-bottom: 25px; scroll-behavior: auto; }
        .list.is-scrolling .render-container { pointer-events: none; }
        .spacer { position: absolute; top: 0; left: 0; width: 1px; }
        .render-container { position: absolute; top: 0; left: 0; width: 100%; padding-left: 16px; padding-right: 16px; will-change: transform; transform: translateZ(0); }
        
        .card { position: relative; display: flex; align-items: flex-start; padding: 15px 18px 15px 18px; padding-right: 90px; background: var(--wa-card); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; height: auto; min-height: 90px; overflow: hidden; box-sizing: border-box; contain: content; touch-action: pan-y; }
        .card-exp-mode { height: auto !important; min-height: 70px !important; padding-bottom: 15px !important; align-items: center !important; padding-right: 18px !important; }
        
        .info { flex: 1; min-width: 0; pointer-events: none; }
        .name { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: var(--text-light); display: flex; align-items: flex-start; }
        .card-badge { font-size: 11px; color: #777777; margin-left: 8px; font-weight: 500; letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); margin-top: -2px; }
        .card-price-ecer { font-size: 13px; color: var(--mono-sec); font-weight: 700; margin-bottom: 3px; }
        .card-price-grosir { font-size: 12px; color: var(--mono-sec); font-weight: 700; margin-bottom: 6px; }
        .card-barcode { font-size: 11px; color: var(--text-muted); font-family: monospace; letter-spacing: 0.5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-exp { font-size: 11px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 4px;}
        .card-exp.warning { color: var(--warning); }
        .card-exp.danger { color: var(--danger); }
        
        .btn-del-absolute { position: absolute; top: 4px; right: 4px; width: 44px; height: 44px; background: none; border: none; color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; outline: none; }
        .action-btns-absolute { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 2px; }
        .card-action-btn { width: 44px; height: 44px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; border-radius: 8px; outline: none; transition: background-color 0.15s ease, opacity 0.15s ease; }
        .card-action-btn:active { background: rgba(255,255,255,0.1); opacity: 1; }
        .btn-edit-icon { color: var(--mono-main); }
        
        .empty-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 100%; color: #555555; font-size: 12px; font-weight: 600; text-align: center; letter-spacing: 0.5px; z-index: 5; }
        .scroll-letter { position: fixed; right: 20px; top: 50%; color: rgba(255, 255, 255, 0.7); font-size: 30px; font-weight: 800; z-index: 100; opacity: 0; pointer-events: none; text-shadow: 0px 4px 15px rgba(0, 0, 0, 1), 0px 0px 5px rgba(0, 0, 0, 0.8); transform: translateY(-50%) scale(0.7); transition: opacity 0.2s ease, transform 0.2s ease-out; }
        .scroll-letter.show { opacity: 1; transform: translateY(-50%) scale(1); }

        /* === 7. FAB BUTTON === */
        .fab { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom, 0px)); right: 20px; background: #000000; width: 60px; height: 60px; border-radius: 18px; display: flex; justify-content: center; align-items: center; border: 2px solid var(--border-color); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8); z-index: 500; cursor: pointer; transition: transform 0.2s, border-color 0.2s; outline: none; }
        .fab:active { transform: scale(0.9); border-color: var(--mono-sec); }

        /* === 8. SEMUA POP-UP MODAL (STANDARISASI NORMAL & SIMETRIS) === */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        
        .modal-box { 
            background: var(--wa-card); padding: 24px 22px; border-radius: 16px; 
            width: 100%; max-width: 320px; 
            border: 2px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            text-align: left; animation: popInBouncy 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            max-height: 85vh; overflow-y: auto; overscroll-behavior: contain; margin: auto;
            transition: border-color 0.3s ease;
        }
        @keyframes popInBouncy { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .modal-box label { display: block; font-size: 10px; color: #888888; margin-bottom: 6px; margin-top: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        .modal-box label:first-child { margin-top: 0; }

        .modal-box input { width: 100%; padding: 12px 14px; background: var(--wa-bg); border: 1px solid var(--border-color); color: var(--text-light); font-size: 14px; font-family: 'Montserrat', sans-serif; font-weight: 600; outline: none; border-radius: 8px; transition: border-color 0.2s; margin-bottom: 2px;}
        .modal-box input:focus { border-color: var(--mono-main); }
        
        .barcode-row { display: flex; gap: 8px; align-items: center; }
        .modal-box input[id="i-b"] { flex: 1; margin: 0; }
        .modal-box button[onclick*="openScanner"] { background: var(--wa-bg); border: 1px solid var(--border-color); border-radius: 8px; height: 44px; width: 46px; transition: all 0.2s ease; outline:none; display:flex; justify-content:center; align-items:center; }
        .modal-box button[onclick*="openScanner"]:active { background: #222; transform: scale(0.95); }
        
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
        .btn-main { width: 100%; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; transition: transform 0.15s ease, opacity 0.2s; display: flex; justify-content: center; align-items: center; min-height: 44px; outline: none; }
        .btn-main:active { transform: scale(0.96); }
        .btn-mono { background-color: var(--mono-main) !important; color: #000000 !important; border: none !important; }
        .btn-cancel { background-color: transparent !important; border: 1px solid var(--border-color) !important; color: var(--text-light) !important; }
        
        button:disabled, input:disabled, .btn-main:disabled { opacity: 0.5 !important; cursor: not-allowed; transform: scale(1) !important; pointer-events: none; }

        /* MODAL KHUSUS HARGA & KALENDER */
        #price-popup-box { border-color: #3CB371 !important; text-align: center; }
        .pp-price-anim { animation: pulseGreen 1s infinite alternate; }
        @keyframes pulseGreen { 0% { text-shadow: 0 0 10px rgba(60, 179, 113, 0.2); } 100% { text-shadow: 0 0 20px rgba(60, 179, 113, 0.8); transform: scale(1.05); } }
        
        .picker-header-new { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .picker-nav-new { background: none; border: none; color: white; font-size: 18px; font-weight: 800; cursor: pointer; outline: none; }
        .picker-year-new { font-size: 15px; font-weight: 700; color: var(--mono-main); font-family: 'Montserrat', sans-serif; }
        .picker-grid-new { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .month-item { color: white; font-size: 13px; font-weight: 600; padding: 12px 0; border-radius: 8px; cursor: pointer; text-align: center; }
        .month-item.active { background: var(--mono-main); color: #000; }
        
        /* SPINNER LOADING CLOUD */
        .spinner { 
            width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid var(--mono-main); border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 20px; 
            transition: border-top-color 0.3s ease;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* === 9. SCANNER UI BARU (MINIMALIS MURNI & SENTER) === */
        #scanner-wrap { display: none; background: #000; position: fixed; inset: 0; z-index: 3500; }
        #reader { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #reader video { object-fit: cover; width: 100%; height: 100%; }
        #qr-shaded-region { display: none !important; } 

        .scanner-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 3510; }
        .scanner-box { width: 260px; height: 180px; border: 2px solid #ffffff; border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 0 0 4000px rgba(0,0,0,0.85); }
        .scanner-laser { width: 100%; height: 2px; background: red; position: absolute; box-shadow: 0 0 15px 2px red; animation: scan-anim 2s infinite ease-in-out; }
        @keyframes scan-anim { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        
        .scan-stop { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: #000000; color: var(--danger); border: 1px solid var(--danger); padding: 15px 40px; border-radius: 12px; font-weight: 700; font-family: 'Montserrat', sans-serif; z-index: 3520; cursor: pointer; min-height: 48px; pointer-events: auto; letter-spacing: 1px; outline:none;}
        .btn-torch { position: absolute; top: 40px; right: 20px; width: 46px; height: 46px; border-radius: 23px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 3520; cursor: pointer; pointer-events: auto; backdrop-filter: blur(5px); transition: all 0.2s ease; outline: none; }
        .btn-torch:active { transform: scale(0.9); }

        /* === 10. TOAST NOTIF === */
        #toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px); background: rgba(21, 21, 21, 0.95); border: 1px solid var(--border-color); border-bottom: 2px solid var(--mono-main); color: var(--text-light); padding: 14px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; z-index: 99999; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; white-space: nowrap; }
        #toast-notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1 class="audiowide-regular"><span style="color:var(--text-light);">DAFTAR</span> <span style="color:var(--text-muted);">HARGA</span></h1>
            <span id="current-date-location" class="header-date-location">Boyolali, Memuat...</span>
        </div>
        <div class="top-btns">
            <button class="icon-btn" onclick="openScanner('search')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" ry="5" stroke="white" stroke-width="1.5"></rect><line class="laser-beam-header" x1="5" y1="12" x2="19" y2="12" stroke="red" stroke-width="2" stroke-linecap="round"></line></svg>
            </button>
            <button class="icon-btn header-upload-btn" onclick="backupToCloud()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#87CEFA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="glow-cloud"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path><path d="M12 16V8"></path><path d="M9 11l3-3 3 3"></path></svg>
                <span style="font-size: 8px; font-weight: 700; color:#87CEFA;">UPLOAD</span>
            </button>
            <div class="dropdown-wrapper">
                <button class="icon-btn" id="kebab-btn" onclick="toggleMenu(event)"><svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
                <div id="dropdown-menu" class="dropdown-content hidden">
                    <div class="dropdown-item" onclick="loadFromCloud()" style="color: #87CEFA;">Load Cloud</div>
                    <div class="dropdown-item" onclick="exportData()" style="color: #3CB371;">Save Excel</div>
                    <label class="dropdown-item" style="color: #3CB371;">Load Excel<input type="file" accept=".xlsx, .xls" onchange="importData(event)"></label>
                    <div class="dropdown-item" onclick="optimizeData()" style="color: #FFA500;">Bersihkan Cache</div>
                    <div class="dropdown-item" onclick="deleteAllDataPrompt()" style="color: var(--danger);">Hapus Semua Data</div>
                </div>
            </div>
        </div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="q" placeholder="search..." autocomplete="off">
            <div id="q-x" class="q-clear" onclick="clearSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6M9 9l6 6"></path></svg></div>
            <div id="search-dropdown" class="search-dropdown-box hidden"><div id="sd-content"></div></div>
        </div>
        <div id="search-summary" class="search-summary hidden"></div>
    </div>

    <div class="tabs-row">
        <button class="tab active" id="t-all" onclick="setTab('all')">HARGA</button>
        <button class="tab" id="t-fav" onclick="setTab('fav')">FAVORIT</button>
        <button class="tab" id="t-exp" onclick="setTab('exp')">EXPIRED</button>
        <button class="sort-btn" id="s-btn" onclick="toggleSort()"><span></span><span></span><span></span></button>
    </div>

    <div id="list" class="list">
        <div id="spacer" class="spacer"></div>
        <div id="render-container" class="render-container"></div>
        <div id="empty-message-container" class="hidden"></div>
    </div>
    
    <div class="scroll-letter" id="scroll-letter">A</div>

    <button class="fab" onclick="showMod()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div id="mod" class="modal" onclick="if(event.target===this && !isSaving) hideMod()">
        <div class="modal-box" id="mod-box">
            <h3 id="m-tit" class="audiowide-regular" style="color:var(--mono-main); margin-top:0; margin-bottom:12px; font-size:16px;">Tambah Barang</h3>
            <label>Nama Barang</label><input type="text" id="i-n" autocomplete="off" style="text-transform: capitalize;">
            <label>Barcode</label>
            <div class="barcode-row">
                <input type="text" id="i-b" inputmode="text" autocomplete="off">
                <button type="button" onclick="openScanner('input')">

    <div id="toast-notification" class="hidden"><span id="toast-message"></span></div>

    <script>
        // === 1. GLOBAL UTILS & WAKE LOCK ===
        const $ = (id) => document.getElementById(id);
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyzjVZ_aUbn4yznjxh-8pdzAAFA0X43L3atxuchVW5cz2FrEc2hjG8Zbxnz3SHJPipLow/exec";
        const NamaBln = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const NamaBlnPendek = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];

        let db = [], idb, worker, workerResult = null, filteredData = [], listOffsets = [];
        let lastStartIndex = -1, lastEndIndex = -1, currentSearchReqId = 0, inputBuffer = '', bufferTimer;
        let barcodeMap = new Map(), acronymMap = new Map(), physicalInputBuffer = "", lastKeyTime = 0;
        let tab = 'all', activeId = null, html5QrCode = null, isScanning = false, isStartingScan = false, sortAZ = false, scanMode = 'search'; 
        let toastTimeoutHide, toastTimeoutRemove, isSaving = false, scrollLetterTimeout;
        const Picker = { sel: new Date(), targetId: '', tempYear: new Date().getFullYear(), tempMonth: new Date().getMonth() };
        let recentSearches = JSON.parse(localStorage.getItem('DB_WA_RECENT')) || [];
        let trendingSearches = JSON.parse(localStorage.getItem('DB_WA_TRENDING')) || {};

        const TemaNotifikasi = { "Error": "var(--danger)", "Gagal": "var(--danger)", "Hapus": "var(--danger)", "Peringatan": "var(--warning)", "Optimasi Sistem": "#FFA500", "Sistem Bersih": "#FFA500", "Backup": "#87CEFA", "Sinkronisasi": "#87CEFA", "Sukses": "#3CB371", "Info": "var(--mono-main)" };

        let wakeLock = null, isWakeLockRequested = false;
        async function requestWakeLock() { try { if ('wakeLock' in navigator && wakeLock === null) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        document.addEventListener('click', () => { if (!isWakeLockRequested) { isWakeLockRequested = true; requestWakeLock(); } }, { once: true });
        document.addEventListener('visibilitychange', async () => { if (isWakeLockRequested && document.visibilityState === 'visible') { wakeLock = null; await requestWakeLock(); } });
        setInterval(async () => { if (isWakeLockRequested && document.visibilityState === 'visible' && wakeLock === null) { await requestWakeLock(); } }, 120000);

        function tampilkanToast(msg, color="var(--mono-main)") { const t = $('toast-notification'); $('toast-message').innerText = msg; t.style.borderBottomColor = color; clearTimeout(toastTimeoutHide); clearTimeout(toastTimeoutRemove); t.classList.remove('hidden'); setTimeout(() => t.classList.add('show'), 10); toastTimeoutHide = setTimeout(() => { t.classList.remove('show'); toastTimeoutRemove = setTimeout(() => t.classList.add('hidden'), 400); }, 3000); }
        function initDB() { return new Promise((resolve, reject) => { const req = indexedDB.open('HargaDB_Pro', 1); req.onupgradeneeded = (e) => { const database = e.target.result; if (!database.objectStoreNames.contains('items')) database.createObjectStore('items', { keyPath: 'id' }); }; req.onsuccess = (e) => resolve(idb = e.target.result); req.onerror = (e) => reject(e.target.error); }); }
        function loadAllFromIDB() { return new Promise((resolve, reject) => { const req = idb.transaction('items', 'readonly').objectStore('items').getAll(); req.onsuccess = () => resolve(req.result); req.onerror = () => reject("Gagal memuat data"); }); }
        function saveItemToIDB(item) { return new Promise((resolve, reject) => { const tx = idb.transaction('items', 'readwrite'); tx.objectStore('items').put(item); tx.oncomplete = () => resolve(); tx.onerror = () => reject("Gagal menyimpan data"); }); }

        function updateMaps() { barcodeMap.clear(); acronymMap.clear(); db.forEach(item => { if (!item.deleted) { if (item.b) barcodeMap.set(String(item.b).trim(), item); if (item.t) acronymMap.set(String(item.t).trim().toLowerCase(), item); } }); }
        function generateUniqueId() { return typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2, 8); }
        const fetchWithTimeout = (url, options, timeout = 15000) => Promise.race([ fetch(url, options), new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), timeout)) ]);
        
        function isAcronymUsed(acr, excludeId, tempSet = null) { if (tempSet && tempSet.has(acr)) return true; const existing = acronymMap.get(acr); if (!existing) return false; return excludeId && String(existing.id) === String(excludeId) ? false : true; }
        function generateSmartAcronym(name, excludeId = null, tempSet = null) { if (!name) return "xxx"; let words = String(name).toLowerCase().replace(/[0-9]/g, '').replace(/[^a-z\s]/g, ' ').split(/\s+/).filter(w => w.length > 0 && !/^(dan|yg|pcs|isi|dengan|rasa|untuk)$/.test(w)); let numMatch = String(name).toLowerCase().match(/\d+/g); let numbers = numMatch ? numMatch.join('') : ''; if (words.length === 0) return "xxx" + numbers; let tryAcr = words.length === 1 ? (words[0].replace(/[aeiou]/g, '').length >= 2 ? words[0].replace(/[aeiou]/g, '').substring(0, 3) : words[0].substring(0, 3)) + numbers : words.slice(0, 5).map(w => w[0]).join('') + numbers; if (!isAcronymUsed(tryAcr, excludeId, tempSet)) return tryAcr; let c = 2; while (isAcronymUsed(tryAcr + c, excludeId, tempSet)) c++; return tryAcr + c; }
        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); gain.gain.setValueAtTime(0.5, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} }
        function formatBulanTahun(dStr) { if (!dStr) return ''; const parts = String(dStr).split('-'); return parts.length >= 2 ? `${NamaBln[parseInt(parts[1], 10) - 1]} ${parts[0]}` : dStr; }
        function parseBulanTahunExcel(str) { if (!str) return ""; if (!isNaN(str) && Number(str) > 20000) { let d = new Date(Date.UTC(1970, 0, Math.floor(Number(str) - 25569) + 1)); return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-01`; } let p = String(str).trim().split(/[\s-]+/); if (p.length === 2) { let b = NamaBln.findIndex(x => x.toLowerCase() === p[0].toLowerCase()); if(b===-1) b = NamaBlnPendek.findIndex(x => x.toLowerCase() === p[0].toLowerCase()); if (b !== -1) return `${p[1]}-${String(b + 1).padStart(2, '0')}-01`; } let pt = String(str).split(/[\-\/]/); return pt.length === 3 ? `${pt[0].length === 4 ? pt[0] : pt[2]}-${String(pt[1]).padStart(2, '0')}-${String(pt[0].length === 4 ? pt[2] : pt[0]).padStart(2, '0')}` : ''; }
        function parseExcelPrice(val) { if (!val) return null; let num = Number(val); if (!isNaN(num)) return Math.floor(num); let s = String(val).trim().replace(/Rp\s?/gi, ''); return parseInt(/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(s) ? s.replace(/,/g, '').split('.')[0] : /^\d{1,3}(\.\d{3})*(,\d+)?$/.test(s) ? s.replace(/\./g, '').split(',')[0] : s.split(',')[0].split('.')[0].replace(/\D/g, ''), 10) || 0; }
        function fmt(n) { return n ? new Intl.NumberFormat('id-ID').format(n) : "0"; }
        function escapeHTML(str) { return String(str).replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }
        function prop(s) { return !s ? "" : String(s).replace(/<\/?[^>]+(>|$)/g, "").trim().split(/([\s/-])/).map(w => w && !/[\s/-]/.test(w) ? w.charAt(0).toUpperCase() + w.slice(1) : w).join('').replace(/\s+/g, ' '); }
        function highlightMatch(text, term) { const safeText = escapeHTML(text || ""); if (!term || term.trim() === '') return safeText; const regex = new RegExp(`(${escapeHTML(term.trim()).replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'); return safeText.replace(regex, '<span class="highlight">$1</span>'); }
        function formatRp(input) { let val = input.value.replace(/\D/g, ""); input.value = val ? fmt(parseInt(val, 10) || 0) : ""; }
        function debounce(func, wait) { let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }

        // === 2. KEYBOARD SCANNER & SEARCH (L'OREAL BUG FIXED) ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { hideMod(); hidePicker(); closeCustomAlert(); closePinModal(); closePricePopup(e, true); if (isScanning) closeScanner(); return; }
            if (document.body.classList.contains('modal-open') || isScanning || document.activeElement.tagName.toLowerCase() === 'input') return;
            const t = Date.now(); if (t - lastKeyTime > 150) physicalInputBuffer = ""; lastKeyTime = t;
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                physicalInputBuffer += e.key; inputBuffer += e.key; clearTimeout(bufferTimer);
                bufferTimer = setTimeout(() => { if (inputBuffer.length > 0) { $('q').value = inputBuffer; $('q-x').style.display = 'flex'; $('list').scrollTop = 0; handleSearchLogic(inputBuffer); } inputBuffer = ''; }, 150); 
            } else if (e.key === 'Enter') {
                if (physicalInputBuffer.length >= 5) { let b = physicalInputBuffer; physicalInputBuffer = inputBuffer = ""; clearTimeout(bufferTimer); e.preventDefault(); handlePhysicalScanner(b); return; }
                if (inputBuffer.length > 0) { physicalInputBuffer = ""; clearTimeout(bufferTimer); $('q').value = inputBuffer; $('q-x').style.display = 'flex'; $('list').scrollTop = 0; handleSearchLogic(inputBuffer); inputBuffer = ''; $('q').blur(); }
            }
        });

        function handlePhysicalScanner(barcode) { const item = barcodeMap.get(barcode); if (item) { playBeep(); $('pp-name').innerText = item.n; $('pp-price').innerText = "Rp " + fmt(item.p1); $('pp-price-grosir').innerText = item.p2 ? "Grosir: Rp " + fmt(item.p2) : ""; $('pp-barcode').innerText = item.b || ""; $('price-popup').style.display = 'flex'; document.body.classList.add('modal-open'); } else { tampilkanToast("Barcode tidak ditemukan!", "var(--danger)"); } }
        function closePricePopup(e, force = false) { if (force || e.target === $('price-popup')) { $('price-popup').style.display = 'none'; document.body.classList.remove('modal-open'); $('q').value = ''; clearSearch(); } }
        function handleSearchLogic(query) { const q = query.trim(), qL = q.toLowerCase(), exact = barcodeMap.get(q) || acronymMap.get(qL); if (exact && q.length > 0) { currentSearchReqId++; workerResult = [exact]; applyFiltersAndRender(); } else { worker.postMessage({ type: 'search', query: q, reqId: ++currentSearchReqId }); } }

        const searchInput = $('q'), searchDropdown = $('search-dropdown'), sdContent = $('sd-content');
        const workerScript = `importScripts('https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js'); let fuse, workerList = []; function rebuildIndex() { fuse = new Fuse(workerList, { keys: [{name: 'n', weight: 0.6}, {name: 't', weight: 0.4}, {name: 'b', weight: 0.8}], threshold: 0.2, ignoreLocation: true }); } self.onmessage = function(e) { if (e.data.type === 'init') { workerList = e.data.db; rebuildIndex(); } else if (e.data.type === 'add') { if(!fuse) return; workerList.push(e.data.item); fuse.add(e.data.item); } else if (e.data.type === 'update') { if(!fuse) return; workerList = workerList.filter(x => String(x.id) !== String(e.data.item.id)); workerList.push(e.data.item); rebuildIndex(); } else if (e.data.type === 'remove') { if(!fuse) return; workerList = workerList.filter(x => String(x.id) !== String(e.data.id)); rebuildIndex(); } else if (e.data.type === 'search') { if(!fuse) return; const hasil = fuse.search(e.data.query); self.postMessage({ type: 'result', data: hasil.map(r => r.item), query: e.data.query, reqId: e.data.reqId }); } };`;
        worker = new Worker(URL.createObjectURL(new Blob([workerScript], { type: 'application/javascript' })));
        worker.onmessage = function(e) { if (e.data.type === 'result' && e.data.reqId === currentSearchReqId) { workerResult = e.data.data; applyFiltersAndRender(); } };

        function recordSearchLog(term) { const c = term.trim(); if(!c) return; recentSearches = [c, ...recentSearches.filter(t => t.toLowerCase() !== c.toLowerCase())].slice(0, 5); localStorage.setItem('DB_WA_RECENT', JSON.stringify(recentSearches)); trendingSearches[c.toLowerCase()] = (trendingSearches[c.toLowerCase()] || 0) + 1; const keys = Object.keys(trendingSearches); if (keys.length > 50) { let min = keys.reduce((a, b) => trendingSearches[a] < trendingSearches[b] ? a : b); delete trendingSearches[min]; } localStorage.setItem('DB_WA_TRENDING', JSON.stringify(trendingSearches)); }
        function clearRecentLogs() { recentSearches = []; localStorage.setItem('DB_WA_RECENT', JSON.stringify([])); showSearchSuggestions(); }
        function showSearchSuggestions() { 
            const val = searchInput.value.trim(); sdContent.innerHTML = ''; 
            if (val === '') { 
                let html = ''; const top = Object.keys(trendingSearches).sort((a,b) => trendingSearches[b] - trendingSearches[a]).slice(0, 3); 
                // BUG L'OREAL FIXED DENGAN data-term
                if(top.length > 0) html += `<div class="sd-title">Sering Dicari</div>` + top.map(t => `<div class="sd-item" onmousedown="executeQuickSearch(this.getAttribute('data-term'))" data-term="${escapeHTML(t)}"> ${escapeHTML(prop(t))}</div>`).join(''); 
                if(recentSearches.length > 0) html += `<div class="sd-title">Terakhir Dicari <span class="clear-btn" onmousedown="clearRecentLogs()">HAPUS</span></div>` + recentSearches.map(t => `<div class="sd-item" onmousedown="executeQuickSearch(this.getAttribute('data-term'))" data-term="${escapeHTML(t)}"> ${escapeHTML(t)}</div>`).join(''); 
                html ? (sdContent.innerHTML = html, searchDropdown.classList.remove('hidden')) : searchDropdown.classList.add('hidden'); 
            } else { searchDropdown.classList.add('hidden'); } 
        }
        function executeQuickSearch(term) { searchInput.value = term; recordSearchLog(term); searchDropdown.classList.add('hidden'); $('q-x').style.display = 'flex'; $('list').scrollTop = 0; handleSearchLogic(term); }
        const handleSearchInput = debounce(() => { const val = searchInput.value.trim(); $('list').scrollTop = 0; if (val) handleSearchLogic(val); else { workerResult = null; applyFiltersAndRender(); } showSearchSuggestions(); }, 150);
        searchInput.addEventListener('input', (e) => { $('q-x').style.display = e.target.value.trim() ? 'flex' : 'none'; handleSearchInput(); });
        searchInput.addEventListener('focus', showSearchSuggestions);
        searchInput.addEventListener('keypress', function(e) { if(e.key === 'Enter') { searchDropdown.classList.add('hidden'); recordSearchLog(this.value); this.blur(); } });
        
        function clearSearch() { searchInput.value = ''; $('q-x').style.display = 'none'; workerResult = null; currentSearchReqId++; $('list').scrollTop = 0; showSearchSuggestions(); applyFiltersAndRender(); searchInput.blur(); }

        // === 3. UI CONTROLS & PEWARNAAN DINAMIS ===
        document.addEventListener('click', (e) => { if (!$('dropdown-menu').classList.contains('hidden') && !e.target.closest('.dropdown-wrapper')) $('dropdown-menu').classList.add('hidden'); if (!$('search-dropdown').classList.contains('hidden') && !e.target.closest('.search-box')) $('search-dropdown').classList.add('hidden'); });
        function toggleMenu(e) { e.stopPropagation(); $('dropdown-menu').classList.toggle('hidden'); }
        function closeCustomAlert() { $('custom-alert').style.display = 'none'; document.body.classList.remove('modal-open'); }
        
        function applyModalColor(title, customColor) {
            const c = customColor || TemaNotifikasi[title] || "var(--mono-main)";
            $('alert-title').innerText = title; 
            $('alert-title').style.color = c; 
            $('alert-box').style.borderColor = c; 
            return c;
        }

        function showAlert(msg, title = "Info", color = null) { 
            const c = applyModalColor(title, color);
            $('alert-msg').innerHTML = String(msg).replace(/\n/g, '<br>'); 
            $('alert-btns').innerHTML = `<button class="btn-main" style="border: 1px solid ${c}!important; color: ${c}!important; background:transparent!important;" onclick="closeCustomAlert()">OKE</button>`; 
            $('custom-alert').style.display = 'flex'; document.body.classList.add('modal-open'); 
        }
        
        // BUG FORMAT PESAN FIXED (innerHTML agar terbaca bold dan break)
        function showConfirm(msg, title, color, callback, confirmText = "OKE") { 
            const c = applyModalColor(title, color);
            $('alert-msg').innerHTML = String(msg).replace(/\n/g, '<br>'); 
            $('alert-btns').innerHTML = `<button class="btn-main btn-cancel" onclick="closeCustomAlert()">BATAL</button><button class="btn-main" style="border: 1px solid ${c}!important; color: ${c}!important; background:transparent!important;" id="confirm-ok-btn">${confirmText}</button>`; 
            $('confirm-ok-btn').onclick = () => { closeCustomAlert(); callback(); }; 
            $('custom-alert').style.display = 'flex'; document.body.classList.add('modal-open'); 
        }
        
        function showMod(id = null) {
            activeId = id; const b = $('i-b'), n = $('i-n'), p1 = $('i-p1'), p2 = $('i-p2'), exp = $('i-exp'), t = $('i-t');
            $('mod-box').style.borderColor = "var(--border-color)"; // Reset color form
            if (id) {
                const it = db.find(x => String(x.id) === String(id)); if(!it) return;
                $('m-tit').innerText = "Edit Barang"; b.value = it.b || ''; n.value = it.n || ''; p1.value = fmt(it.p1); p2.value = it.p2 ? fmt(it.p2) : ''; 
                exp.dataset.rawDate = it.exp || ''; exp.value = it.exp ? formatBulanTahun(it.exp) : ''; t.value = it.t || '';
            } else { $('m-tit').innerText = "Tambah Barang"; b.value = n.value = p1.value = p2.value = exp.dataset.rawDate = exp.value = t.value = ''; }
            $('mod').style.display = 'flex'; document.body.classList.add('modal-open'); setTimeout(() => $('i-n').focus(), 100);

        function setTab(t) { tab = t; ['all', 'fav', 'exp'].forEach(x => $(`t-${x}`).className = t === x ? 'tab active' : 'tab'); $('list').scrollTop = 0; applyFiltersAndRender(); }
        function toggleSort() { sortAZ = !sortAZ; $('s-btn').classList.toggle('active', sortAZ); $('list').scrollTop = 0; applyFiltersAndRender(); }
        function computeDVS() { listOffsets = [0]; let cur = 0; for (let i = 0; i < filteredData.length; i++) { cur += filteredData[i]._cHeight || (tab === 'exp' ? 85 : 90); listOffsets.push(cur); } $('spacer').style.height = cur + 'px'; }
        function getDVSStartIndex(st) { let l = 0, h = listOffsets.length - 1; while (l <= h) { let m = Math.floor((l + h) / 2); if (listOffsets[m] === st) return m; if (listOffsets[m] < st) l = m + 1; else h = m - 1; } return h > 0 ? h : 0; }
        
        function applyFiltersAndRender(silentB = null) {
            const q = $('q').value.trim(), qL = q.toLowerCase(); let active = db.filter(i => !i.deleted);
            const exact = active.find(i => i.b && String(i.b).toLowerCase() === qL);
            let base = silentB ? active.filter(i => i.b === silentB) : (exact ? [exact] : (workerResult !== null && q !== '' ? workerResult : active));
            const today = Date.now();
            
            filteredData = base.filter(i => {
                if (tab === 'fav') return i.f;
                if (tab === 'exp') { if (!i.exp) return false; const utcExp = new Date(i.exp).getTime(); return !isNaN(utcExp) && Math.floor((utcExp - today) / 86400000) <= 210; }
                return true;
            });

            if (!q || tab === 'exp') {
                if (tab === 'exp') { filteredData.sort((a, b) => new Date(a.exp||'9999').getTime() - new Date(b.exp||'9999').getTime()); }
                else if (sortAZ) { filteredData.sort((a,b) => String(a.n||"").localeCompare(String(b.n||"")) || (b.updatedAt||0) - (a.updatedAt||0)); } 
                else { filteredData.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0)); }
            }
            const sumEl = $('search-summary');
            if (q && !silentB && !exact) { sumEl.innerText = `Ditemukan ${filteredData.length} barang`; sumEl.classList.remove('hidden'); } else sumEl.classList.add('hidden');
            
            lastStartIndex = lastEndIndex = -1; computeDVS(); renderVirtualList(false);
        }

        function renderVirtualList(isScrolling = false) {
            const cont = $('list'), rend = $('render-container'), space = $('spacer'), empty = $('empty-message-container'); 
            if (filteredData.length === 0) { space.style.height = '0px'; rend.innerHTML = ''; empty.innerHTML = `<div class="empty-msg">${tab === 'fav' ? "Belum ada favorit" : (tab === 'exp' ? "Tidak ada barang expired" : "Belum ada data")}</div>`; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden'); 
            
            let st = cont.scrollTop, start = getDVSStartIndex(st), visH = cont.clientHeight, end = start, curVisH = 0;
            start = Math.max(0, start - 15);
            while(end < filteredData.length && curVisH < visH + 1200) { curVisH += (filteredData[end]._cHeight || (tab === 'exp' ? 85 : 90)); end++; }
            if (isScrolling && start === lastStartIndex && end === lastEndIndex) return; 
            lastStartIndex = start; lastEndIndex = end;

            rend.style.transform = `translateY(${listOffsets[start]}px)`; let html = ''; 
            const today = Date.now(), sq = $('q').value.trim(); 
            
            for (let i = start; i < end; i++) {
                const it = filteredData[i]; let diff = 999, expT = '';
                if (it.exp) { const utcExp = new Date(it.exp).getTime(); if (!isNaN(utcExp)) { diff = Math.floor((utcExp - today) / 86400000); expT = formatBulanTahun(it.exp); } }

                if (tab === 'exp') {
                    const c = diff <= 30 ? 'var(--danger)' : (diff <= 90 ? '#FFA500' : (diff <= 180 ? '#FFD700' : 'var(--mono-main)')); 
                    html += `<div class="card card-exp-mode" id="c-${it.id}"><div class="info" style="display:flex; justify-content:space-between; align-items:center; width:100%; gap:10px;"><div class="name" style="margin:0; flex:1; min-width:0;"><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${dn}</span> <span class="card-badge">${it.t || ''}</span></div><div style="font-size:13px; font-weight:800; color:${c};">${expT}</div></div>${bx}</div>`;
                } else {
                    let exH = it.exp ? `<div class="card-exp ${diff < 0 ? 'danger' : (diff <= 90 ? 'warning' : '')}"><span>${diff < 0 ? '🚨' : (diff <= 90 ? '⚠️' : '📅')}</span> ${diff < 0 ? 'Kedaluwarsa!' : (diff <= 90 ? `Exp dlm ${diff} hari` : `Exp: ${expT}`)}</div>` : '';
                    html += `<div class="card" id="c-${it.id}"><div class="info"><div class="name"><span>${dn}</span> <span class="card-badge">${it.t || ''}</span></div>${it.p1?`<div class="card-price-ecer">Ecer: Rp ${fmt(it.p1)}</div>`:''}${it.p2?`<div class="card-price-grosir">Grosir: Rp ${fmt(it.p2)}</div>`:''}<div class="card-barcode">${it.b || '- Tanpa Barcode -'}</div>${exH}</div>${bx}<div class="action-btns-absolute"><button class="card-action-btn action-fav" data-id="${it.id}" style="color:${it.f?'var(--mono-main)':'var(--text-muted)'};"><svg pointer-events="none" viewBox="0 0 24 24" width="18" height="18" fill="${it.f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button><button class="card-action-btn btn-edit-icon action-edit" data-id="${it.id}"><svg pointer-events="none" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div></div>`;
                }
            }
            rend.innerHTML = html;
            
            requestAnimationFrame(() => {
                let hc = false; const dom = rend.children;
                for (let i = 0; i < dom.length; i++) {
                    const h = dom[i].offsetHeight + 12; const idx = start + i;
                    if (filteredData[idx] && filteredData[idx]._cHeight !== h) { filteredData[idx]._cHeight = h; hc = true; }
                }
                if (hc) computeDVS();
            });
        }

        // === 6. DATABASE OP ===
        async function save() {
            if (isSaving) return; isSaving = true;
            const btnSave = $('btn-save-item'), btnCancel = $('btn-cancel-item');
            if (btnSave) btnSave.disabled = true; // LOCK ANTI DOUBLE TAP
            if (btnCancel) btnCancel.disabled = true;

            try {
                const nRaw = $('i-n').value, b = $('i-b').value.trim(), exp = $('i-exp').dataset.rawDate || '';
                const p1 = parseInt($('i-p1').value.replace(/[^\d]/g, ''), 10) || 0, p2 = parseInt($('i-p2').value.replace(/[^\d]/g, ''), 10) || null;
                if (!nRaw.trim() || p1 === 0) { isSaving = false; if(btnSave) btnSave.disabled = false; if(btnCancel) btnCancel.disabled = false; return showAlert("Data tidak valid!", "Gagal"); }
                const clean = prop(nRaw);

                const ex = db.find(x => !x.deleted && String(x.n || "").toLowerCase() === clean.toLowerCase() && String(x.id) !== String(activeId));
                if (ex) { isSaving = false; if(btnSave) btnSave.disabled = false; if(btnCancel) btnCancel.disabled = false; return showAlert("Nama sudah ada!", "Gagal"); }
                if (b !== '') { const exB = db.find(x => !x.deleted && String(x.b) === b && String(x.id) !== String(activeId)); if (exB) { isSaving = false; if(btnSave) btnSave.disabled = false; if(btnCancel) btnCancel.disabled = false; return showAlert("Barcode dipakai barang lain!", "Gagal"); } }
                
                let t = $('i-t').value.trim().toLowerCase();
                if (t && isAcronymUsed(t, activeId)) { isSaving = false; if(btnSave) btnSave.disabled = false; if(btnCancel) btnCancel.disabled = false; return showAlert("Singkatan sudah dipakai!", "Gagal"); }
                if (!t) t = generateSmartAcronym(clean, activeId);
                
                const ts = Date.now();
                if (activeId) {
                    const idx = db.findIndex(x => String(x.id) === String(activeId));
                    db[idx] = { ...db[idx], b, n: clean, p1, p2, exp, t, updatedAt: ts };
                    await saveItemToIDB(db[idx]); worker.postMessage({ type: 'update', item: db[idx] }); 
                    if (workerResult) { const wIdx = workerResult.findIndex(x => String(x.id) === String(activeId)); if (wIdx > -1) workerResult[wIdx] = db[idx]; }
                } else {
                    const nIt = { id: generateUniqueId(), b, n: clean, p1, p2, f: false, exp, t, updatedAt: ts, deleted: false };
                    db.push(nIt); await saveItemToIDB(nIt); worker.postMessage({ type: 'add', item: nIt }); 
                    if (workerResult) workerResult.unshift(nIt); 
                }
                updateMaps(); hideMod(); applyFiltersAndRender(); tampilkanToast("Tersimpan!");
            } catch (e) { console.error(e); } finally { isSaving = false; if(btnSave) btnSave.disabled = false; if(btnCancel) btnCancel.disabled = false; }
        }

        function backupToCloud() { 
            if (db.length === 0) return; 
            // PERINGATAN DETAIL SESUAI DESAIN UI GAMBAR
            const pesanPeringatan = "<b>Peringatan Keamanan!</b>\n\nTindakan ini akan mengunggah dan MENIMPA seluruh data yang ada di Cloud dengan data dari HP Anda saat ini.\n\nPastikan data di HP sudah benar.\nLanjutkan?";
            
            showConfirm(pesanPeringatan, "Informasi", "#87CEFA", () => { 
                showLoading("Mengunggah data ke Cloud...<br>Mohon tunggu sebentar.", "#87CEFA"); 
                fetchWithTimeout(CLOUD_URL, { method: 'POST', body: JSON.stringify({ action: 'backup', data: db }) }, 15000)
                .then(() => { hideLoading(); tampilkanToast("Berhasil Upload!", "#87CEFA"); })
                .catch(() => { hideLoading(); showAlert("Koneksi Gagal / Timeout. Silakan coba lagi.", "Error"); }); 
            }, "LANJUTKAN"); // TOMBOL SPESIFIK LANJUTKAN

        function loadFromCloud() { 
            showConfirm("Load data dari Cloud?", "Sinkronisasi", "#87CEFA", () => { 
                showLoading("Memuat data dari Cloud...<br>Mohon tunggu sebentar.", "#87CEFA");
                fetchWithTimeout(CLOUD_URL + "?action=load&t=" + Date.now(), {}, 15000).then(r => r.json()).then(async dC => { 
                    if (Array.isArray(dC)) { 
                        const tx = idb.transaction('items', 'readwrite'), s = tx.objectStore('items'); 
                        dC.forEach(iC => { 
                            const lIdx = db.findIndex(l => l.id === iC.id); 
                            if (lIdx > -1) { if ((iC.updatedAt || 0) > (db[lIdx].updatedAt || 0)) { db[lIdx] = iC; if (iC.deleted) s.delete(iC.id); else s.put(iC); } } 
                            else { db.push(iC); if (!iC.deleted) s.put(iC); } 
                        }); 
                        tx.oncomplete = () => { worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) }); updateMaps(); clearSearch(); hideLoading(); tampilkanToast("Sinkronisasi Selesai!", "#87CEFA"); }; 
                    } 
                }).catch(() => { hideLoading(); showAlert("Koneksi Gagal / Timeout. Silakan coba lagi.", "Error"); }); 
            }); 
        }

        function importData(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { const w = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'}), jD = XLSX.utils.sheet_to_json(w.Sheets[w.SheetNames[0]], { raw: false, defval: "" }), tx = idb.transaction('items', 'readwrite'), s = tx.objectStore('items'), tA = new Set(), ts = Date.now(); jD.forEach(ro => { const n = prop(ro["Nama Barang"] || ro["Nama"]); if(!n) return; let cT = ro["Singkatan"]; if (!cT) cT = generateSmartAcronym(n, null, tA); if (cT) tA.add(cT); const eI = ro["ID"] ? String(ro["ID"]).trim() : null, sB = ro["Barcode"] ? String(ro["Barcode"]).trim() : '', iF = ro["Favorit"] === "Ya" || ro["Favorit"] === "TRUE", eD = parseBulanTahunExcel(ro["Expired"]); let eIdx = db.findIndex(x => (eI && String(x.id) === String(eI)) || (x.n.toLowerCase() === n.toLowerCase())); if (eIdx > -1) { db[eIdx] = { ...db[eIdx], b: sB, p1: parseExcelPrice(ro["Eceran"]||ro["Harga Eceran"]), p2: parseExcelPrice(ro["Grosir"]||ro["Harga Grosir"]), t: cT, f: iF, exp: eD, updatedAt: ts, deleted: false }; s.put(db[eIdx]); } else { const nI = { id: eI || generateUniqueId(), b: sB, n: n, p1: parseExcelPrice(ro["Eceran"]||ro["Harga Eceran"]), p2: parseExcelPrice(ro["Grosir"]||ro["Harga Grosir"]), t: cT, f: iF, exp: eD, updatedAt: ts, deleted: false }; db.push(nI); s.put(nI); } }); tx.oncomplete = () => { worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) }); updateMaps(); clearSearch(); tampilkanToast("Import Selesai!"); }; }; r.readAsArrayBuffer(f); }
        
        // === 8. SCANNER UI BARU (MINIMALIS MURNI & SENTER) ===
        let torchState = false; 
        function toggleFlashlight() {
            const vid = document.querySelector('#reader video');
            if (vid && vid.srcObject) {
                try {
                    const track = vid.srcObject.getVideoTracks()[0];
                    const cap = track.getCapabilities();
                    if (cap.torch) {
                        torchState = !torchState;
                        track.applyConstraints({ advanced: [{ torch: torchState }] }).catch(e => console.log(e));
                        $('torch-btn').style.color = torchState ? "var(--warning)" : "white";
                    } else { tampilkanToast("Kamera tidak dukung senter", "var(--warning)"); }
                } catch(e) { console.log(e); }
            }
        }

        async function openScanner(mode) {
            if(isStartingScan || isScanning) return; 
            isStartingScan = true; scanMode = mode;
            $('scanner-wrap').style.display = 'block'; document.body.classList.add('modal-open');
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            torchState = false; $('torch-btn').style.color = "white"; 
            try {
                await html5QrCode.start( { facingMode: "environment" }, { fps: 15, disableFlip: false }, 
                    async (text) => {
                        playBeep(); await closeScanner();
                        if (scanMode === 'search') {
                            const ex = db.find(i => !i.deleted && String(i.b) === text.trim());
                            if (ex) { $('q').value = text.trim(); $('q-x').style.display = 'flex'; handleSearchLogic(text.trim()); } 
                            else { showMod(); $('i-b').value = text.trim(); }
                        } else { $('i-b').value = text.trim(); }
                    }
                );
                isScanning = true;
            } catch (e) { await closeScanner(); showAlert("Kamera Error / Izin Ditolak.", "Error"); } 
            finally { isStartingScan = false; }
        }

        async function closeScanner() { 
            $('scanner-wrap').style.display = 'none'; 
            document.body.classList.remove('modal-open');
            if (torchState) toggleFlashlight(); 
            if (isScanning && html5QrCode) { try { await html5QrCode.stop(); html5QrCode.clear(); } catch(e) {} } 
            isScanning = false; 
            if (isWakeLockRequested && wakeLock === null) requestWakeLock(); 
        }

        async function initApp() { try { const t = new Date(); $('current-date-location').innerText = `Boyolali, ${t.getDate()} ${NamaBln[t.getMonth()]} ${t.getFullYear()}`; await initDB(); db = await loadAllFromIDB(); worker.postMessage({ type: 'init', db: db.filter(i => !i.deleted) }); updateMaps(); applyFiltersAndRender(); } catch (e) { showAlert("DB Error", "Error"); } }
        initApp();
    </script>
</body>
</html>
